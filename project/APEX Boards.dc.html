<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0}</style>
</helmet>
<div style="width:max-content;min-width:100%;min-height:100vh;box-sizing:border-box;padding:56px 56px 80px;background:#e7e5df;font-family:Manrope,sans-serif">

  <div style="display:flex;align-items:flex-end;gap:18px;margin-bottom:8px">
    <div style="width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,#0a1422,#05080f);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px -6px rgba(0,0,0,.4)">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M6.5 6.5l11 11M4 8l2-2M8 4L6 6M16 20l2-2M20 16l-2 2M3 9l3 3-3 3-2-2 2-2-2-2 2-2zm18 6l-3-3 3-3 2 2-2 2 2 2-2 2z" stroke="#2DE2E6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div style="font-family:Archivo,sans-serif;font-weight:900;font-size:30px;color:#1c1c1a;letter-spacing:-.8px">APEX</div>
    <div style="font-size:15px;color:#86857d;font-weight:500;padding-bottom:5px">Gym Performance App · All Screens</div>
  </div>
  <div style="height:1px;background:#cfcdc4;margin:22px 0 40px"></div>

  <!-- SECTION: CORE -->
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:22px">
    <span style="width:7px;height:7px;border-radius:50%;background:#2DE2E6"></span>
    <span style="font-family:Archivo,sans-serif;font-weight:700;font-size:13px;letter-spacing:2px;color:#6c6b63">CORE NAVIGATION</span>
  </div>
  <div style="display:flex;gap:44px;align-items:flex-start;margin-bottom:64px">
    <div style="flex:none;width:404px">
      <div style="display:flex;align-items:baseline;gap:9px;margin:0 0 16px 4px"><span style="font-weight:700;font-size:12px;color:#b3b1a7">01</span><span style="font-weight:600;font-size:15px;color:#3a3a37">Home · Dashboard</span></div>
      <dc-import name="APEX" start="home" board="{{ true }}" hint-size="404px,874px" style="width:404px"></dc-import>
    </div>
    <div style="flex:none;width:404px">
      <div style="display:flex;align-items:baseline;gap:9px;margin:0 0 16px 4px"><span style="font-weight:700;font-size:12px;color:#b3b1a7">02</span><span style="font-weight:600;font-size:15px;color:#3a3a37">Programs</span></div>
      <dc-import name="APEX" start="plans" board="{{ true }}" hint-size="404px,874px" style="width:404px"></dc-import>
    </div>
    <div style="flex:none;width:404px">
      <div style="display:flex;align-items:baseline;gap:9px;margin:0 0 16px 4px"><span style="font-weight:700;font-size:12px;color:#b3b1a7">03</span><span style="font-weight:600;font-size:15px;color:#3a3a37">Exercise Library</span></div>
      <dc-import name="APEX" start="exercises" board="{{ true }}" hint-size="404px,874px" style="width:404px"></dc-import>
    </div>
    <div style="flex:none;width:404px">
      <div style="display:flex;align-items:baseline;gap:9px;margin:0 0 16px 4px"><span style="font-weight:700;font-size:12px;color:#b3b1a7">04</span><span style="font-weight:600;font-size:15px;color:#3a3a37">Nutrition</span></div>
      <dc-import name="APEX" start="nutrition" board="{{ true }}" hint-size="404px,874px" style="width:404px"></dc-import>
    </div>
    <div style="flex:none;width:404px">
      <div style="display:flex;align-items:baseline;gap:9px;margin:0 0 16px 4px"><span style="font-weight:700;font-size:12px;color:#b3b1a7">05</span><span style="font-weight:600;font-size:15px;color:#3a3a37">Profile</span></div>
      <dc-import name="APEX" start="profile" board="{{ true }}" hint-size="404px,874px" style="width:404px"></dc-import>
    </div>
  </div>

  <!-- SECTION: DETAIL & WORKOUT -->
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:22px">
    <span style="width:7px;height:7px;border-radius:50%;background:#F5A623"></span>
    <span style="font-family:Archivo,sans-serif;font-weight:700;font-size:13px;letter-spacing:2px;color:#6c6b63">DETAIL VIEWS &amp; LIVE WORKOUT</span>
  </div>
  <div style="display:flex;gap:44px;align-items:flex-start">
    <div style="flex:none;width:404px">
      <div style="display:flex;align-items:baseline;gap:9px;margin:0 0 16px 4px"><span style="font-weight:700;font-size:12px;color:#b3b1a7">06</span><span style="font-weight:600;font-size:15px;color:#3a3a37">Exercise Detail</span></div>
      <dc-import name="APEX" start="exercise" board="{{ true }}" hint-size="404px,874px" style="width:404px"></dc-import>
    </div>
    <div style="flex:none;width:404px">
      <div style="display:flex;align-items:baseline;gap:9px;margin:0 0 16px 4px"><span style="font-weight:700;font-size:12px;color:#b3b1a7">07</span><span style="font-weight:600;font-size:15px;color:#3a3a37">Program Detail</span></div>
      <dc-import name="APEX" start="plan" board="{{ true }}" hint-size="404px,874px" style="width:404px"></dc-import>
    </div>
    <div style="flex:none;width:404px">
      <div style="display:flex;align-items:baseline;gap:9px;margin:0 0 16px 4px"><span style="font-weight:700;font-size:12px;color:#b3b1a7">08</span><span style="font-weight:600;font-size:15px;color:#3a3a37">Workout · Active Set</span></div>
      <dc-import name="APEX" start="workout" board="{{ true }}" hint-size="404px,874px" style="width:404px"></dc-import>
    </div>
    <div style="flex:none;width:404px">
      <div style="display:flex;align-items:baseline;gap:9px;margin:0 0 16px 4px"><span style="font-weight:700;font-size:12px;color:#b3b1a7">09</span><span style="font-weight:600;font-size:15px;color:#3a3a37">Workout · Rest Timer</span></div>
      <dc-import name="APEX" start="rest" board="{{ true }}" hint-size="404px,874px" style="width:404px"></dc-import>
    </div>
    <div style="flex:none;width:404px">
      <div style="display:flex;align-items:baseline;gap:9px;margin:0 0 16px 4px"><span style="font-weight:700;font-size:12px;color:#b3b1a7">10</span><span style="font-weight:600;font-size:15px;color:#3a3a37">Workout · Complete</span></div>
      <dc-import name="APEX" start="done" board="{{ true }}" hint-size="404px,874px" style="width:404px"></dc-import>
    </div>
  </div>

</div>
</x-dc>
</body>
</html>
